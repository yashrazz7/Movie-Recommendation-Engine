<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>CineMatch <span>AI</span></h1>
            <p>Content-Based Movie Recommendation Engine</p>
        </header>

        <main>
            <div class="input-section">
                <label for="movieSelect">Select a Movie You Love:</label>
                <div class="custom-select-wrapper">
                    <select id="movieSelect">
                        <option value="" disabled selected>Choose a movie...</option>
                    </select>
                </div>
                <button id="recommendBtn" onclick="getAIRecommendations()">Get AI Recommendations</button>
            </div>

            <div class="output-section">
                <h2>Recommended For You</h2>
                <div id="recommendationsGrid" class="movies-grid">
                    <div class="placeholder-text">Your tailored recommendations will appear here...</div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
